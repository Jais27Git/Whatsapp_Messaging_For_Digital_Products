name: Voucher Sync

on:
  schedule:
    # Every 30 minutes
    - cron: "*/30 * * * *"

  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Sync Script
        env:
          METABASE_URL: ${{ secrets.METABASE_URL }}
          METABASE_API_KEY: ${{ secrets.METABASE_API_KEY }}
          CARD_ID: ${{ secrets.CARD_ID }}

          WA_PHONE_NUMBER_ID: ${{ secrets.WA_PHONE_NUMBER_ID }}
          WA_ACCESS_TOKEN: ${{ secrets.WA_ACCESS_TOKEN }}

          SERVICE_ACCOUNT_INFO: ${{ secrets.SERVICE_ACCOUNT_INFO }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}

        run: Whatsapp_Automation.py
